name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install GStreamer (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install GStreamer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # The devel MSI ships .pc files but NO pkg-config.exe, so install
          # one. The .pc files are relocatable, so extract location is free.
          choco install -y pkgconfiglite

          $msi = "gstreamer-1.0-devel-msvc-x86_64-1.24.13.msi"
          $url = "https://gstreamer.freedesktop.org/data/pkg/windows/1.24.13/msvc/$msi"
          Invoke-WebRequest -Uri $url -OutFile $msi
          # Administrative extract; the MSI nests its payload under
          # TARGETDIR, so discover the real layout instead of guessing.
          $extractDir = "C:\gst-extract"
          Start-Process msiexec.exe -Wait -NoNewWindow -ArgumentList "/a", "`"$(Resolve-Path $msi)`"", "/qn", "TARGETDIR=`"${extractDir}`""
          $pc = Get-ChildItem -Recurse $extractDir -Filter "glib-2.0.pc" | Select-Object -First 1
          if (-not $pc) {
            Get-ChildItem -Recurse -Directory $extractDir | Select-Object -First 40 -ExpandProperty FullName
            throw "glib-2.0.pc not found in extracted MSI"
          }
          $gstRoot = $pc.Directory.Parent.Parent.FullName
          echo "PKG_CONFIG_PATH=$($pc.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "${gstRoot}\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install GStreamer (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gstreamer gst-plugins-base gst-plugins-good gst-plugins-bad gst-plugins-ugly

      - run: cargo check --all-targets

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - run: cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev
      - run: cargo test
