name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  GST_VERSION: "1.24.13"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: x86_64-linux

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: aarch64-linux

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: x86_64-windows

          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Install GStreamer (development headers for compilation) ──

      - name: Install GStreamer (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install GStreamer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # The devel MSI ships .pc files but NO pkg-config.exe (verified
          # against 1.24.13), so install one. The .pc files are relocatable
          # (prefix=${pcfiledir}/../..), so the extract location is free.
          choco install -y pkgconfiglite

          $msi = "gstreamer-1.0-devel-msvc-x86_64-${{ env.GST_VERSION }}.msi"
          $url = "https://gstreamer.freedesktop.org/data/pkg/windows/${{ env.GST_VERSION }}/msvc/$msi"
          Invoke-WebRequest -Uri $url -OutFile $msi
          # Administrative install — extracts without actually "installing".
          # Note: the MSI nests its payload (gstreamer\1.0\msvc_x86_64\...)
          # under TARGETDIR, so discover the real layout instead of guessing.
          $extractDir = "C:\gst-extract"
          Start-Process msiexec.exe -Wait -NoNewWindow -ArgumentList "/a", "`"$(Resolve-Path $msi)`"", "/qn", "TARGETDIR=`"${extractDir}`""
          $pc = Get-ChildItem -Recurse $extractDir -Filter "glib-2.0.pc" | Select-Object -First 1
          if (-not $pc) {
            Get-ChildItem -Recurse -Directory $extractDir | Select-Object -First 40 -ExpandProperty FullName
            throw "glib-2.0.pc not found in extracted MSI"
          }
          $pkgconfigDir = $pc.Directory.FullName
          $gstRoot = $pc.Directory.Parent.Parent.FullName
          Write-Host "GStreamer root: $gstRoot"
          Write-Host "pkgconfig dir:  $pkgconfigDir"
          echo "PKG_CONFIG_PATH=${pkgconfigDir}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "GSTREAMER_1_0_ROOT_MSVC_X86_64=${gstRoot}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "${gstRoot}\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install GStreamer (macOS)
        if: runner.os == 'macOS'
        run: |
          # ORDER MATTERS: runtime first, devel second. The runtime pkg's
          # osx-framework sub-package declares Versions/1.0 as a bundle with
          # <upgrade-bundle> semantics, so installing it over an existing
          # framework REPLACES the whole directory — with devel installed
          # first, its headers/.pc files get silently wiped while its pkg
          # receipts survive, which made this maddening to diagnose.
          curl -fsSL "https://gstreamer.freedesktop.org/data/pkg/osx/${{ env.GST_VERSION }}/gstreamer-1.0-${{ env.GST_VERSION }}-universal.pkg" -o /tmp/gst-runtime.pkg
          sudo installer -verboseR -pkg /tmp/gst-runtime.pkg -target /
          curl -fsSL "https://gstreamer.freedesktop.org/data/pkg/osx/${{ env.GST_VERSION }}/gstreamer-1.0-devel-${{ env.GST_VERSION }}-universal.pkg" -o /tmp/gst-dev.pkg
          sudo installer -verboseR -pkg /tmp/gst-dev.pkg -target /
          # Fail here, with a map of what actually landed, rather than
          # letting cargo produce a less helpful pkg-config error later.
          echo "== gstreamer receipts =="
          pkgutil --pkgs | grep -i gstreamer | head -30 || true
          echo "== framework layout =="
          ls /Library/Frameworks/ || true
          ls /Library/Frameworks/GStreamer.framework/Versions/ || true
          test -f /Library/Frameworks/GStreamer.framework/Versions/1.0/lib/pkgconfig/gstreamer-1.0.pc \
            || { echo "gstreamer-1.0.pc missing after install"; find /Library/Frameworks/GStreamer.framework -maxdepth 3 2>/dev/null | head -40; exit 1; }

      # ── Build ──

      - name: Build release (single-arch)
        if: runner.os != 'macOS'
        run: cargo build --release

      - name: Build release (macOS universal)
        if: runner.os == 'macOS'
        env:
          # The .pkg installs into Versions/1.0; the Versions/Current symlink
          # is NOT reliably created on the runner, so point at 1.0 directly.
          PKG_CONFIG_PATH: /Library/Frameworks/GStreamer.framework/Versions/1.0/lib/pkgconfig
          # The x86_64 build below is a cross-compile from the arm64 host;
          # the pkg-config crate refuses cross builds without this (the
          # GStreamer framework is universal, so the same .pc files serve
          # both architectures).
          PKG_CONFIG_ALLOW_CROSS: "1"
        run: |
          rustup target add x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p target/release
          lipo -create -output target/release/multiplex-controller \
            target/aarch64-apple-darwin/release/multiplex-controller \
            target/x86_64-apple-darwin/release/multiplex-controller
          lipo -create -output target/release/multiplex-client \
            target/aarch64-apple-darwin/release/multiplex-client \
            target/x86_64-apple-darwin/release/multiplex-client

      # ── Package ──

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/multiplex
          cp target/release/multiplex-controller target/release/multiplex-client dist/multiplex/
          tar czf "dist/multiplex-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz" -C dist/multiplex .

      - name: Bundle + Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          scripts/bundle-windows.ps1 -Version "${{ github.ref_name }}" -GstVersion "${{ env.GST_VERSION }}"

      - name: Bundle + Package (macOS)
        if: runner.os == 'macOS'
        run: |
          scripts/bundle-macos.sh "${{ github.ref_name }}"

      # ── Signed update-bundle artifacts (consumed by the auto-updater) ──
      #
      # Each job renames its binaries to flat per-triple asset names, signs
      # them with the release key (see CLAUDE.md "Auto-Update" and
      # crates/multiplex-shared/examples/update_sign.rs), and emits the
      # manifest fragments. A follow-up job assembles manifest.toml and
      # uploads everything to the release.

      - name: Sign update artifacts
        shell: bash
        env:
          MULTIPLEX_SIGNING_KEY: ${{ secrets.MULTIPLEX_SIGNING_KEY }}
        run: |
          if [ -z "$MULTIPLEX_SIGNING_KEY" ]; then
            echo "::error::MULTIPLEX_SIGNING_KEY secret is not set — cannot sign the update bundle. Run: gh secret set MULTIPLEX_SIGNING_KEY < ~/.multiplex/release_signing.key"
            exit 1
          fi
          mkdir -p update/bin update/fragments
          frag="update/fragments/${{ matrix.suffix }}.toml"
          sign() { # <clients|controllers> <triple> <src> <flat-name>
            cp "$3" "update/bin/$4"
            cargo run -q -p multiplex-shared --example update_sign -- "$1" "$2" "update/bin/$4" >> "$frag"
            echo >> "$frag"
          }
          if [ "$RUNNER_OS" = "macOS" ]; then
            # One universal binary serves both Apple triples; the manifest
            # lists it under each so the controller finds it either way.
            for triple in aarch64-apple-darwin x86_64-apple-darwin; do
              sign clients     "$triple" target/release/multiplex-client     multiplex-client-macos-universal
              sign controllers "$triple" target/release/multiplex-controller multiplex-controller-macos-universal
            done
            # sign() copies the same file repeatedly — harmless.
          else
            EXT=""
            [ "$RUNNER_OS" = "Windows" ] && EXT=".exe"
            # The manifest's [clients.<triple>] key must stay the real Rust
            # target triple (matches what clients report in HELLO), but the
            # flat asset/file name is opaque — use the friendlier suffix
            # instead of the triple's "unknown" vendor component.
            sign clients     "${{ matrix.target }}" "target/release/multiplex-client$EXT"     "multiplex-client-${{ matrix.suffix }}$EXT"
            sign controllers "${{ matrix.target }}" "target/release/multiplex-controller$EXT" "multiplex-controller-${{ matrix.suffix }}$EXT"
          fi
          cat "$frag"

      - name: Stash update artifacts for the manifest job
        uses: actions/upload-artifact@v4
        with:
          name: update-${{ matrix.suffix }}
          path: update/
          if-no-files-found: error

      # ── Upload ──

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  # Assemble the signed update bundle from every platform's artifacts and
  # attach it to the release: manifest.toml + one flat binary per target.
  update-bundle:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: update-*
          merge-multiple: true
          path: bundle

      - name: Assemble manifest.toml
        run: |
          # The manifest version is the crates' semver (what clients report
          # in HELLO), not the git tag.
          version=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          {
            echo "version = \"$version\""
            echo
            cat bundle/fragments/*.toml
          } > bundle/manifest.toml
          echo "── manifest.toml ──"
          cat bundle/manifest.toml

      - name: Upload update bundle to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bundle/manifest.toml
            bundle/bin/*
