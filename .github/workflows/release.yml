name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  GST_VERSION: "1.24.13"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: x86_64-linux

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: aarch64-linux

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: x86_64-windows

          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Install GStreamer (development headers for compilation) ──

      - name: Install GStreamer (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install GStreamer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msi = "gstreamer-1.0-devel-msvc-x86_64-${{ env.GST_VERSION }}.msi"
          $url = "https://gstreamer.freedesktop.org/data/pkg/windows/${{ env.GST_VERSION }}/msvc/$msi"
          Invoke-WebRequest -Uri $url -OutFile $msi
          # Administrative install — extracts without actually "installing"
          $extractDir = "C:\gstreamer\1.0\msvc_x86_64"
          Start-Process msiexec.exe -Wait -NoNewWindow -ArgumentList "/a", "`"$(Resolve-Path $msi)`"", "/qn", "TARGETDIR=`"${extractDir}`""
          # Add bin to PATH
          echo "${extractDir}\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "GSTREAMER_1_0_ROOT_MSVC_X86_64=${extractDir}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # GStreamer has a bundled pkg-config; add it to PATH
          echo "${extractDir}\bin\pkg-config" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          # Set PKG_CONFIG_PATH so glib-sys can find .pc files
          echo "PKG_CONFIG_PATH=${extractDir}\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install GStreamer (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -fsSL "https://gstreamer.freedesktop.org/data/pkg/osx/${{ env.GST_VERSION }}/gstreamer-1.0-devel-${{ env.GST_VERSION }}-universal.pkg" -o /tmp/gst-dev.pkg
          sudo installer -pkg /tmp/gst-dev.pkg -target /
          # Also install the runtime .pkg (needed for dylib bundling)
          curl -fsSL "https://gstreamer.freedesktop.org/data/pkg/osx/${{ env.GST_VERSION }}/gstreamer-1.0-${{ env.GST_VERSION }}-universal.pkg" -o /tmp/gst-runtime.pkg
          sudo installer -pkg /tmp/gst-runtime.pkg -target /
          brew install dylibbundler

      # ── Build ──

      - name: Build release (single-arch)
        if: runner.os != 'macOS'
        run: cargo build --release

      - name: Build release (macOS universal)
        if: runner.os == 'macOS'
        run: |
          # Set up pkg-config path for the universal framework
          export PKG_CONFIG_PATH="/Library/Frameworks/GStreamer.framework/Versions/Current/lib/pkgconfig${PKG_CONFIG_PATH:+:}${PKG_CONFIG_PATH}"
          rustup target add x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p target/release
          lipo -create -output target/release/cuemesh2-controller \
            target/aarch64-apple-darwin/release/cuemesh2-controller \
            target/x86_64-apple-darwin/release/cuemesh2-controller
          lipo -create -output target/release/cuemesh2-client \
            target/aarch64-apple-darwin/release/cuemesh2-client \
            target/x86_64-apple-darwin/release/cuemesh2-client

      # ── Package ──

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/cuemesh2
          cp target/release/cuemesh2-controller target/release/cuemesh2-client dist/cuemesh2/
          tar czf "dist/cuemesh2-${{ github.ref_name }}-${{ matrix.suffix }}.tar.gz" -C dist/cuemesh2 .

      - name: Bundle + Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          scripts/bundle-windows.ps1 -Version "${{ github.ref_name }}" -GstVersion "${{ env.GST_VERSION }}"

      - name: Bundle + Package (macOS)
        if: runner.os == 'macOS'
        run: |
          scripts/bundle-macos.sh "${{ github.ref_name }}"

      # ── Upload ──

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
